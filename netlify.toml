# Netlify — frontend (React / Vite)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
